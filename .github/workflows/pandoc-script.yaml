name: Pandoc PDF

on:
  # triggered manually
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  pandoc_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our semester-repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download script
        run: |
          wget https://gist.githubusercontent.com/rbf/6064734/raw/d7bb7e143d4ecb1324258e422c7ae9cfe2f74ced/generate-pdf
      - name: Install pandoc
        # uses: docker://pandoc/extra:latest-debian
        run: |
          sudo apt install pandoc texlive-xetex texlive-latex-base texlive-latex-extra texlive-latex-recommended -y
      - name: Run script
        run: |
          chmod +x generate-pdf
          ./generate-pdf --version
          mkdir -p targets/lecture-target
          ./generate-pdf lecture targets/lecture-target
      - name: Publish targets
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: _pdfs
          publish_dir: targets/
          force_orphan: true
